name: Deploy

on:
  push:
    branches: [master]
    # Snapshot commits (`generated/**`) are produced by this workflow itself.
    # Ignoring that path here keeps the commit-back step from re-triggering
    # the workflow.
    paths-ignore: ['generated/**']
  schedule:
    # Daily at 08:00 UTC — refreshes source-fetched stats so the dashboard
    # stays current without a manual push.
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Opt JavaScript actions into Node.js 24 ahead of the September 2026 default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # Fast inter-run persistence of the connector snapshot. Cache survives
      # ~7 days; the commit-back step below is the durable backup.
      - uses: actions/cache@v4
        with:
          path: generated/snapshot.json
          key: connector-snapshot-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            connector-snapshot-${{ github.ref_name }}-
            connector-snapshot-

      - run: npm ci
      - run: npm run build
        env:
          # Authenticated GitHub API access. Falls back to the auto-injected
          # token (1000 req/hr) when no PAT is configured — enough for typical
          # use. See README "Optional: higher GitHub API rate limit".
          GITHUB_TOKEN: ${{ secrets.GH_API_TOKEN || secrets.GITHUB_TOKEN }}

      # Durable backup: commit the refreshed snapshot back to the repo on
      # scheduled/manual runs so it survives cache eviction and is visible in
      # the repo browser. Push-triggered builds skip this — pushes are usually
      # code changes; we don't want to pile a data commit on top.
      - name: Commit snapshot back (scheduled/manual runs only)
        if: github.event_name != 'push'
        run: |
          set -e
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f generated/snapshot.json
          if git diff --quiet --cached HEAD -- generated/snapshot.json; then
            echo 'Snapshot unchanged — nothing to commit.'
          else
            git commit -m 'chore: refresh connector snapshot [skip ci]'
            git push
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
