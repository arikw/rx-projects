name: Deploy

on:
  push:
    branches: [master]
    # Snapshot + media-cache commits are produced by this workflow itself.
    # Ignoring these paths keeps the commit-back step from re-triggering it.
    paths-ignore: ['generated/**', 'public/_cache/**']
  schedule:
    # Daily at 01:00 UTC — refreshes source-fetched stats so the dashboard
    # stays current without a manual push. GitHub adds 50-90 minutes of
    # scheduling jitter so the actual run lands somewhere around 01:50-02:30
    # UTC in practice (which is still well off-peak for most timezones).
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Opt JavaScript actions into Node.js 24 ahead of the September 2026 default.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # This workflow is a no-op on the canonical repo (arikw/live-dev-portfolio)
    # — the canonical site is deployed via a different pipeline and we don't
    # want the daily cron rebuilding stats / committing snapshots there.
    # Forks (any other `<owner>/<name>`) WILL run the workflow normally,
    # which is the path cloners follow to deploy their own dashboard.
    if: github.repository != 'arikw/live-dev-portfolio'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - name: Install yt-dlp + ffmpeg (YouTube → MP4 caching)
        # The build's media cache transcodes any YouTube URL surfaced by
        # a connector into a local MP4 (one file per video id, shared
        # across connectors and across builds). yt-dlp downloads;
        # ffmpeg muxes when YouTube only serves separate video / audio
        # streams. Skipping this step is non-fatal — the cache module
        # logs a warning and falls back to <iframe> embeds — but the
        # whole point of the workflow is to commit the MP4s back, so
        # the install runs unconditionally.
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg
          # Pin to a recent yt-dlp via pipx — apt's package lags
          # YouTube format changes by months, which causes silent
          # download failures.
          pipx install yt-dlp
          yt-dlp --version
          ffmpeg -version | head -1
      - run: npm ci
      - run: npm run build
        env:
          # Authenticated GitHub API access. Falls back to the auto-injected
          # token (1000 req/hr) when no PAT is configured — enough for typical
          # use. See README "Optional: higher GitHub API rate limit".
          GITHUB_TOKEN: ${{ secrets.GH_API_TOKEN || secrets.GITHUB_TOKEN }}

      # Durable backup: commit the refreshed snapshot AND the downloaded media
      # cache back to the repo on scheduled/manual runs.
      #   - generated/ — connector snapshots, per-connector data, url-maps.
      #   - public/_cache/ — image / video bytes referenced by url-map.json.
      # Both are gitignored locally so cloners' personal handles stay out of
      # forks until they configure their own; CI force-adds them so the cron
      # rebuild is fast (no upstream re-fetch) and Pages has the bytes to
      # serve. Push-triggered builds skip this — pushes are usually code
      # changes; we don't want to pile data commits on top.
      - name: Commit snapshot + media cache back (scheduled/manual runs only)
        if: github.event_name != 'push'
        run: |
          set -e
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -f generated/
          test -d public/_cache && git add -f public/_cache/ || true
          if git diff --quiet --cached HEAD -- generated/ public/_cache/; then
            echo 'Generated data + media cache unchanged — nothing to commit.'
          else
            git commit -m 'chore: refresh connector snapshot + media cache [skip ci]'
            git push
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    # Mirror the build job's repo guard — skip on the canonical repo.
    if: github.repository != 'arikw/live-dev-portfolio'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
